<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>호텔 리뷰 AI</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; background: #f8f9fa; }
    h3 { margin: 0 0 10px; font-size: 16px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 10px; }
    .tabs button { padding: 8px 14px; border: none; background: #e9ecef; border-radius: 8px; cursor: pointer; }
    .tabs button.active { background: #1a73e8; color: #fff; }
    .panel { display: none; padding: 10px 0; }
    .panel.active { display: block; }
    #reviews-list { max-height: 180px; overflow-y: auto; font-size: 12px; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #dee2e6; margin-bottom: 10px; white-space: pre-wrap; }
    #chat-log { max-height: 280px; overflow-y: auto; padding: 10px; background: #fff; border-radius: 8px; border: 1px solid #dee2e6; margin-bottom: 8px; font-size: 13px; }
    #chat-log div { margin: 6px 0; }
    #chat-input { width: 100%; padding: 10px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 14px; }
    button { cursor: pointer; padding: 8px 14px; border-radius: 8px; border: none; background: #1a73e8; color: #fff; font-size: 13px; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #btn-close { position: absolute; top: 8px; right: 8px; background: #6c757d; padding: 4px 10px; font-size: 12px; }
  </style>
</head>
<body>
  <div style="position:relative; padding-right: 28px;">
    <button id="btn-close">닫기</button>
    <h3>호텔 리뷰 AI 도우미</h3>
    <div class="tabs">
      <button data-tab="collect">1. 리뷰 수집</button>
      <button data-tab="chat">2. AI 질의</button>
    </div>
    <div id="panel-collect" class="panel">
      <p>투숙객 리뷰를 최신순으로 최대 100개까지 수집합니다.</p>
      <button id="btn-collect">리뷰 수집 시작</button>
      <div id="reviews-list"></div>
    </div>
    <div id="panel-chat" class="panel">
      <p>수집한 리뷰를 기반으로만 답변합니다.</p>
      <div id="chat-log"></div>
      <input type="text" id="chat-input" placeholder="질문을 입력하세요 (예: 어떤 객실 타입 리뷰가 있나요?)">
      <button id="btn-send" style="margin-top:6px;">전송</button>
    </div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
